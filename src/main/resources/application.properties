spring.application.name=payment-service
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/payments-db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=payment-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.payments.payment_service.event.PaymentEvent
spring.kafka.template.observation-enabled=true
spring.kafka.listener.observation-enabled=true

# Circuit breaker configuration
resilience4j.circuitbreaker.instances.exchangeRateService.sliding-window-size=5
resilience4j.circuitbreaker.instances.exchangeRateService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.exchangeRateService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.exchangeRateService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.exchangeRateService.automatic-transition-from-open-to-half-open-enabled=true

# Expose circuit breaker health via actuator
management.endpoints.web.exposure.include=health,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# Retry configuration
resilience4j.retry.instances.exchangeRateService.max-attempts=3
resilience4j.retry.instances.exchangeRateService.wait-duration=500ms

# Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.level=%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]